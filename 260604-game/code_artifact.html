<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>냉장고 파먹기! (Fridge Buster)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React 및 Babel CDN (단일 파일 프로토타입용) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide 아이콘 라이브러리 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
        /* 모바일 뷰포트 고정 스타일 */
        .mobile-container { max-width: 450px; min-height: 100vh; margin: 0 auto; background-color: #ffffff; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        /* 스크롤바 감추기 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    // 기획서에 기재된 API 키 및 모델 설정
    const GEMINI_API_KEY = "AQ.Ab8RN6JKLrz9vt8JXONiyn_O9kWz1J_Md4cwTU-8S41NRuGeUA";
    const MODEL_NAME = "gemini-2.5-flash"; 

    // LLM의 마크다운 래핑 및 특수문자 대응을 위한 안전한 JSON 파서 유틸리티
    const cleanAndParseJSON = (text) => {
        let cleanText = text.trim();
        if (cleanText.startsWith("```")) {
            cleanText = cleanText.replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/, "");
        }
        return JSON.parse(cleanText.trim());
    };

    function App() {
        // 화면 네비게이션 상태: 'UPLOAD', 'EDIT', 'RECIPE', 'MYPAGE'
        const [screen, setScreen] = useState('UPLOAD');
        
        // 데이터 상태 관리
        const [imagePreview, setImagePreview] = useState(null);
        const [imageBase64, setImageBase64] = useState("");
        const [ingredients, setIngredients] = useState([]);
        const [newIngredient, setNewIngredient] = useState("");
        
        // 기본 상비 양념 프리셋 설정 (F-05)
        const [seasonings, setSeasonings] = useState([
            { id: '간장', name: '간장', checked: true },
            { id: '설탕', name: '설탕', checked: true },
            { id: '소금', name: '소금', checked: true },
            { id: '식용유', name: '식용유', checked: true },
            { id: '고춧가루', name: '고춧가루', checked: true },
            { id: '참기름', name: '참기름', checked: true }
        ]);

        // 식단 필터 상태 (F-07)
        const [activeFilter, setActiveFilter] = useState('일반식');
        const filters = ['일반식', '다이어트/저칼로리', '매운 음식 제외', '캠핑 요리'];

        // 추천된 레시피 결과 리스트 및 선택된 레시피 탭 (F-06)
        const [recipes, setRecipes] = useState([]);
        const [activeRecipeIdx, setActiveRecipeIdx] = useState(0);
        
        // 즐겨찾기 스크랩 저장소 (F-09)
        const [savedRecipes, setSavedRecipes] = useState([]);
        
        // 글로벌 UI 상태 (로딩 및 커스텀 토스트 알림)
        const [loading, setLoading] = useState(false);
        const [loadingMessage, setLoadingMessage] = useState("");
        const [toast, setToast] = useState({ show: false, message: "" });

        // 화면 갱신 및 마운트 시 Lucide 아이콘 일괄 재생성 전담 이펙트
        useEffect(() => {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }, [screen, recipes, activeRecipeIdx, savedRecipes, loading, toast]);

        // 토스트 표시 함수 (순정 alert 대체)
        const showToast = (msg) => {
            setToast({ show: true, message: msg });
            setTimeout(() => setToast({ show: false, message: "" }), 3000);
        };

        // 1단계: 이미지 업로드 및 클라이언트 측 압축 처리 (F-02, 기술고려사항)
        const handleImageUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            setLoading(true);
            setLoadingMessage("이미지를 최적화하는 중입니다...");

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // Canvas를 이용한 이미지 압축으로 API 레이턴시 최소화
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    setImagePreview(compressedBase64);
                    setImageBase64(compressedBase64.split(',')[1]); // API 전송용 pure base64
                    
                    setLoading(false);
                    // 식재료 자동 인식 API 호출 시동
                    analyzeIngredients(compressedBase64.split(',')[1]);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        // 2단계: Gemini API를 통한 식재료 추출 (F-03 Vision)
        const analyzeIngredients = async (base64Data) => {
            setLoading(true);
            setLoadingMessage("AI가 식재료를 정밀 분석하고 있습니다...");
            
            const prompt = "이 이미지에 있는 식재료들을 모두 찾아내어 한국어로 이름을 나열해줘. 출력 형식은 오직 제시된 JSON 구조로만 작성해줘. JSON 코드 블록(```json ... ```) 기호는 제외하고 순수한 JSON 문자열만 반환해.\n\nOutput Schema:\n{\n  \"ingredients\": [\n    { \"name\": \"당근\", \"confidence\": 0.95, \"category\": \"채소\" }\n  ]\n}";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || "식재료 인식 실패");

                const responseText = data.candidates[0].content.parts[0].text.trim();
                const parsedData = cleanAndParseJSON(responseText);
                
                setIngredients(parsedData.ingredients || []);
                setScreen('EDIT'); // 편집 화면으로 전환
            } catch (err) {
                console.error(err);
                showToast("식재료를 분석하는 도중 오류가 발생했습니다. 수동 입력을 이용해주세요!");
                // 실패 시 빈 목록으로 편집창 진입 유도
                setIngredients([]);
                setScreen('EDIT');
            } finally {
                setLoading(false);
            }
        };

        // 3단계: 맞춤형 AI 레시피 3가지 생성 (F-06, F-07)
        const generateRecipes = async () => {
            if (ingredients.length === 0) {
                showToast("최소 하나의 식재료는 등록되어야 합니다.");
                return;
            }

            setLoading(true);
            setLoadingMessage("나만의 맞춤 레시피 3가지를 요리하는 중...");

            const selectedIngredients = ingredients.map(i => i.name).join(", ");
            const activeSeasonings = seasonings.filter(s => s.checked).map(s => s.name).join(", ");
            
            const prompt = `보유 식재료: [${selectedIngredients}], 구비된 기본 양념: [${activeSeasonings}]. 필터 조건: [${activeFilter}]. 이 조건에 맞춰 만들 수 있는 서로 다른 맞춤형 레시피 3가지를 제안해줘. 출력 형식은 오직 아래 JSON 구조 스키마 양식으로만 반환해줘. 마크다운 기호는 절대 쓰지 마.\n\nOutput Schema:\n[\n  {\n    \"recipeName\": \"요리명\",\n    \"difficulty\": \"쉬움/보통/어려움\",\n    \"time\": \"약 20분\",\n    \"calories\": \"350kcal\",\n    \"hasIngredients\": [\"보유재료1\", \"보유재료2\"],\n    \"needIngredients\": [\"대파 (없으면 생략 가능)\"],\n    \"steps\": [\"1단계 요리과정\", \"2단계 요리과정\"],\n    \"tip\": \"꿀팁 내용\"\n  }\n]`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || "레시피 생성 실패");

                const responseText = data.candidates[0].content.parts[0].text.trim();
                const parsedRecipes = cleanAndParseJSON(responseText);

                setRecipes(parsedRecipes);
                setActiveRecipeIdx(0);
                setScreen('RECIPE'); // 결과 화면으로 이동
            } catch (err) {
                console.error(err);
                showToast("레시피 생성에 실패했습니다. 다시 시도해 주세요.");
            } finally {
                setLoading(false);
            }
        };

        // 식재료 핸들러 (수동 추가 및 삭제) (F-04)
        const addIngredient = () => {
            if (!newIngredient.trim()) return;
            setIngredients([...ingredients, { name: newIngredient.trim(), confidence: 1.0, category: "기타" }]);
            setNewIngredient("");
        };

        const removeIngredient = (index) => {
            setIngredients(ingredients.filter((_, i) => i !== index));
        };

        // 상비 양념 토글 기능 (F-05)
        const toggleSeasoning = (id) => {
            setSeasonings(seasonings.map(s => s.id === id ? { ...s, checked: !s.checked } : s));
        };

        // 레시피 즐겨찾기 스크랩 기능 (F-09)
        const scrapRecipe = (recipe) => {
            if (savedRecipes.some(r => r.recipeName === recipe.recipeName)) {
                showToast("이미 보관함에 저장된 레시피입니다.");
                return;
            }
            setSavedRecipes([...savedRecipes, { ...recipe, savedAt: new Date().toLocaleDateString() }]);
            showToast("🎁 즐겨찾기 보관함에 저장되었습니다!");
        };

        // TTS(음성 읽기) 가이드 기능 (F-08)
        const handleTTS = (text) => {
            if ('speechSynthesis' in window) {
                // 작동 중인 음성이 있으면 정지 후 새로 재생
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ko-KR';
                window.speechSynthesis.speak(utterance);
                showToast("🔊 조리 안내 음성을 재생합니다.");
            } else {
                showToast("이 브라우저는 음성 안내(TTS)를 지원하지 않습니다.");
            }
        };

        return (
            <div className="mobile-container flex flex-col relative min-h-screen">
                
                {/* 글로벌 탑 헤더 (F-01, F-09 공통) */}
                <header className="flex items-center justify-between px-4 py-3 border-b border-gray-100 bg-white sticky top-0 z-40">
                    <div className="flex items-center space-x-1 cursor-pointer" onClick={() => setScreen('UPLOAD')}>
                        <span className="text-2xl">🍳</span>
                        <h1 className="text-xl font-bold text-orange-500 tracking-tight">냉장고 파먹기!</h1>
                    </div>
                    <button className="text-gray-600 hover:text-orange-500 p-1" onClick={() => setScreen('MYPAGE')}>
                        <i data-lucide="user" className="w-6 h-6"></i>
                    </button>
                </header>

                {/* 메인 콘텐츠 영역 */}
                <main className="flex-1 p-4 pb-24">
                    
                    {/* [1] 메인 / 식재료 업로드 화면 */}
                    {screen === 'UPLOAD' && (
                        <div className="space-y-6">
                            <div className="text-center py-4">
                                <h2 className="text-xl font-bold text-gray-800">오늘 뭐 먹지? 🤔</h2>
                                <p className="text-sm text-gray-500 mt-1">냉장고 속 재료 사진을 올려주세요. AI가 레시피를 찾아드립니다!</p>
                            </div>

                            {/* 드롭존 형태의 대형 업로드 영역 */}
                            <label className="border-2 border-dashed border-orange-300 rounded-3xl p-8 flex flex-col items-center justify-center bg-orange-50/30 cursor-pointer hover:bg-orange-50 transition min-h-[260px]">
                                <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                                <div className="bg-orange-500 text-white p-4 rounded-full shadow-lg shadow-orange-500/20 mb-4">
                                    <i data-lucide="camera" className="w-8 h-8"></i>
                                </div>
                                <span className="font-semibold text-gray-700">냉장고 내부 촬영 / 사진 선택</span>
                                <span className="text-xs text-gray-400 mt-2">JPG, PNG 형식을 지원합니다</span>
                            </label>

                            <div className="relative flex py-2 items-center text-gray-400">
                                <div className="flex-grow border-t border-gray-200"></div>
                                <span className="flex-shrink mx-4 text-xs font-semibold">또는</span>
                                <div className="flex-grow border-t border-gray-200"></div>
                            </div>

                            {/* 수동 입력 진입 버튼 */}
                            <button 
                                className="w-full py-3.5 bg-gray-100 text-gray-700 font-semibold rounded-2xl hover:bg-gray-200 transition text-center text-sm"
                                onClick={() => { setIngredients([]); setScreen('EDIT'); }}
                            >
                                직접 텍스트로 입력할래요 ✍️
                            </button>

                            {/* 미니 인기 레시피 배너 슬라이더 */}
                            <div className="bg-amber-50 rounded-2xl p-4 border border-amber-100">
                                <span className="text-xs font-bold text-amber-700 bg-amber-200/60 px-2 py-0.5 rounded-full">인기 파먹기 팁</span>
                                <p className="text-sm font-semibold text-gray-800 mt-2">"자투리 당근과 양파는 다져서 냉동실에 두면 볶음밥용으로 최고예요!"</p>
                            </div>
                        </div>
                    )}

                    {/* [2] 식재료 확인 및 편집 화면 */}
                    {screen === 'EDIT' && (
                        <div className="space-y-6">
                            <div>
                                <h2 className="text-lg font-bold text-gray-800">식재료 확인 및 수정</h2>
                                <p className="text-xs text-gray-400 mt-0.5">AI가 분석한 재료가 맞는지 확인하고 커스텀해 주세요.</p>
                            </div>

                            {/* 원본 이미지 프리뷰 축소본 */}
                            {imagePreview && (
                                <div className="relative h-28 rounded-2xl overflow-hidden shadow-sm">
                                    <img src={imagePreview} className="w-full h-full object-cover" alt="냉장고 분석 이미지" />
                                    <div className="absolute inset-0 bg-black/20 flex items-center justify-center">
                                        <span className="text-white text-xs bg-black/40 px-2.5 py-1 rounded-full backdrop-blur-xs">AI 인식 완료</span>
                                    </div>
                                </div>
                            )}

                            {/* 식재료 리스트 (태그/칩 형태) */}
                            <div className="space-y-3">
                                <label className="text-sm font-bold text-gray-700 block">인식된 식재료</label>
                                <div className="flex flex-wrap gap-2 p-3 bg-gray-50 rounded-2xl min-h-[80px]">
                                    {ingredients.length === 0 && <p className="text-xs text-gray-400 m-auto">등록된 식재료가 없습니다. 아래에서 직접 추가해 보세요!</p>}
                                    {ingredients.map((ing, idx) => (
                                        <div key={idx} className="inline-flex items-center bg-white border border-gray-200 px-3 py-1.5 rounded-full text-sm font-medium text-gray-800 shadow-xs">
                                            <span>{ing.name}</span>
                                            {ing.confidence < 1 && <span className="text-[10px] text-orange-400 ml-1 font-bold">{Math.round(ing.confidence * 100)}%</span>}
                                            <button onClick={() => removeIngredient(idx)} className="ml-1.5 text-gray-400 hover:text-red-500">
                                                <i data-lucide="x" className="w-3.5 h-3.5"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>

                                {/* 직접 입력 추가 컴포넌트 */}
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        placeholder="예: 다진 마늘, 스팸" 
                                        className="flex-1 px-4 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-orange-500"
                                        value={newIngredient}
                                        onChange={(e) => setNewIngredient(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && addIngredient()}
                                    />
                                    <button onClick={addIngredient} className="px-4 py-2 bg-gray-800 text-white rounded-xl text-sm font-semibold hover:bg-gray-900 transition">
                                        + 직접 추가
                                    </button>
                                </div>
                            </div>

                            {/* 보유 양념 토글 배너 */}
                            <div className="space-y-3">
                                <label className="text-sm font-bold text-gray-700 block">우리집 기본 양념장 설정</label>
                                <div className="grid grid-cols-3 gap-2">
                                    {seasonings.map(s => (
                                        <button 
                                            key={s.id}
                                            onClick={() => toggleSeasoning(s.id)}
                                            className={`py-2 text-xs font-semibold rounded-xl border transition ${s.checked ? 'bg-orange-50 border-orange-400 text-orange-600' : 'bg-white border-gray-200 text-gray-500'}`}
                                        >
                                            {s.name} {s.checked ? '✅' : '❌'}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* 옵션 필터 선택 영역 */}
                            <div className="space-y-2">
                                <label className="text-sm font-bold text-gray-700 block">선호 조리 식단 스타일</label>
                                <div className="flex gap-1.5 overflow-x-auto pb-1 scrollbar-hide">
                                    {filters.map(f => (
                                        <button
                                            key={f}
                                            onClick={() => setActiveFilter(f)}
                                            className={`whitespace-nowrap px-3 py-1.5 text-xs rounded-full font-medium transition ${activeFilter === f ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                                        >
                                            {f}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* 플로팅 추천 버튼 */}
                            <div className="pt-4">
                                <button 
                                    onClick={generateRecipes}
                                    className="w-full py-4 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-2xl shadow-lg shadow-orange-500/20 transition text-center"
                                >
                                    🚀 이 재료로 레시피 추천받기 (3개)
                                </button>
                            </div>
                        </div>
                    )}

                    {/* [3] 맞춤 레시피 결과 화면 */}
                    {screen === 'RECIPE' && recipes.length > 0 && (
                        <div className="space-y-5">
                            {/* 상단 레시피 스와이프 탭 카드 */}
                            <div className="flex gap-2 overflow-x-auto py-1 scrollbar-hide">
                                {recipes.map((r, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => setActiveRecipeIdx(idx)}
                                        className={`flex-shrink-0 w-48 p-3 rounded-2xl border text-left transition ${activeRecipeIdx === idx ? 'border-orange-500 bg-orange-50/50 ring-2 ring-orange-500/20' : 'border-gray-200 bg-white'}`}
                                    >
                                        <span className="text-[10px] uppercase tracking-wider font-bold text-orange-500 block mb-1">추천 {idx + 1}</span>
                                        <h3 className="font-bold text-sm text-gray-800 line-clamp-1">{r.recipeName}</h3>
                                    </button>
                                ))}
                            </div>

                            {/* 선택된 레시피 상세 본문 */}
                            <div className="bg-white rounded-3xl border border-gray-100 shadow-xs p-5 space-y-5">
                                <div className="border-b border-gray-100 pb-4">
                                    <h2 className="text-xl font-bold text-gray-900">{recipes[activeRecipeIdx].recipeName}</h2>
                                    
                                    {/* 요리 정보 요약 */}
                                    <div className="flex items-center space-x-4 mt-3 text-xs font-semibold text-gray-500">
                                        <span className="flex items-center"><i data-lucide="gauge" className="w-3.5 h-3.5 mr-1 text-orange-500"></i>난이도: {recipes[activeRecipeIdx].difficulty}</span>
                                        <span className="flex items-center"><i data-lucide="clock" className="w-3.5 h-3.5 mr-1 text-orange-500"></i>시간: {recipes[activeRecipeIdx].time}</span>
                                        <span className="flex items-center"><i data-lucide="flame" className="w-3.5 h-3.5 mr-1 text-orange-500"></i>{recipes[activeRecipeIdx].calories}</span>
                                    </div>
                                </div>

                                {/* 재료 구분 정보 */}
                                <div className="space-y-2">
                                    <h3 className="text-sm font-bold text-gray-800">필요 식재료</h3>
                                    <div className="text-xs space-y-1.5">
                                        <p className="text-gray-700"><strong className="text-green-600">🟢 있는 재료:</strong> {recipes[activeRecipeIdx].hasIngredients.join(", ")}</p>
                                        {recipes[activeRecipeIdx].needIngredients?.length > 0 && (
                                            <p className="text-gray-700"><strong className="text-red-500">🔴 부족한 재료 (대체 가능):</strong> {recipes[activeRecipeIdx].needIngredients.join(", ")}</p>
                                        )}
                                    </div>
                                </div>

                                {/* Step-by-Step 조리 단계 및 TTS 단독 호출 */}
                                <div className="space-y-3">
                                    <div className="flex justify-between items-center">
                                        <h3 className="text-sm font-bold text-gray-800">조리 순서</h3>
                                        <button 
                                            onClick={() => handleTTS(recipes[activeRecipeIdx].steps.join("... 다음 단계 ... "))}
                                            className="text-xs text-orange-600 font-bold flex items-center bg-orange-50 px-2 py-1 rounded-lg animate-pulse"
                                        >
                                            <i data-lucide="volume-2" className="w-3.5 h-3.5 mr-1"></i> 전체 연속 읽기
                                        </button>
                                    </div>
                                    <ol className="space-y-3">
                                        {recipes[activeRecipeIdx].steps.map((step, sIdx) => (
                                            <li key={sIdx} className="flex items-start bg-gray-50/60 p-3 rounded-xl border border-gray-100">
                                                <span className="bg-orange-500 text-white font-bold text-xs rounded-full w-5 h-5 flex items-center justify-center flex-shrink-0 mt-0.5 mr-2.5">{sIdx + 1}</span>
                                                <p className="text-sm text-gray-700 flex-1 leading-relaxed">{step}</p>
                                                <button onClick={() => handleTTS(step)} className="text-gray-400 hover:text-orange-500 ml-2 p-0.5">
                                                    <i data-lucide="play-circle" className="w-4 h-4"></i>
                                                </button>
                                            </li>
                                        ))}
                                    </ol>
                                </div>

                                {/* 팁 박스 */}
                                <div className="bg-orange-50/40 rounded-xl p-3 border border-orange-100 text-xs text-gray-600">
                                    💡 <strong>마스터 셰프 꿀팁:</strong> {recipes[activeRecipeIdx].tip}
                                </div>

                                {/* 하단 인터랙션 버튼 액션 */}
                                <div className="grid grid-cols-3 gap-2 pt-2">
                                    <button onClick={() => scrapRecipe(recipes[activeRecipeIdx])} className="py-2.5 bg-gray-100 text-gray-700 text-xs font-bold rounded-xl flex flex-col items-center justify-center hover:bg-gray-200 transition">
                                        <i data-lucide="star" className="w-4 h-4 mb-1 text-amber-500 fill-amber-500"></i> 즐겨찾기
                                    </button>
                                    <button onClick={() => {
                                        navigator.clipboard.writeText(`[냉장고 파먹기] 추천 요리: ${recipes[activeRecipeIdx].recipeName}\n${recipes[activeRecipeIdx].steps.join('\n')}`);
                                        showToast("💬 레시피 텍스트가 클립보드에 복사되었습니다!");
                                    }} className="py-2.5 bg-yellow-100 text-yellow-800 text-xs font-bold rounded-xl flex flex-col items-center justify-center hover:bg-yellow-200 transition">
                                        <i data-lucide="share-2" className="w-4 h-4 mb-1 text-yellow-700"></i> 공유하기
                                    </button>
                                    <button onClick={() => setScreen('EDIT')} className="py-2.5 bg-gray-800 text-white text-xs font-bold rounded-xl flex flex-col items-center justify-center hover:bg-gray-900 transition">
                                        <i data-lucide="refresh-cw" className="w-4 h-4 mb-1"></i> 재추천 받기
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* [4] 마이페이지 및 즐겨찾기 보관함 화면 */}
                    {screen === 'MYPAGE' && (
                        <div className="space-y-6">
                            <div>
                                <h2 className="text-lg font-bold text-gray-800">마이페이지</h2>
                                <p className="text-xs text-gray-400 mt-0.5">저장된 파먹기 히스토리와 상비 설정을 관리합니다.</p>
                            </div>

                            {/* 스크랩한 레시피 목록 */}
                            <div className="space-y-3">
                                <h3 className="text-sm font-bold text-gray-700 flex items-center">
                                    <i data-lucide="bookmark" className="w-4 h-4 mr-1 text-orange-500 fill-orange-500"></i> 스크랩한 레시피 보관함 ({savedRecipes.length})
                                </h3>
                                {savedRecipes.length === 0 ? (
                                    <div className="text-center py-8 border border-dashed border-gray-200 rounded-2xl text-xs text-gray-400">
                                        아직 저장된 레시피가 없어요. 마음에 드는 요리를 즐겨찾기 해보세요!
                                    </div>
                                ) : (
                                    <div className="space-y-2.5">
                                        {savedRecipes.map((sr, idx) => (
                                            <div key={idx} className="p-3 bg-white border border-gray-100 rounded-xl shadow-xs flex justify-between items-center hover:border-orange-300 transition cursor-pointer" onClick={() => {
                                                setRecipes([sr]); // 단일 레시피 결과창 바인딩 후 이동
                                                setActiveRecipeIdx(0);
                                                setScreen('RECIPE');
                                            }}>
                                                <div>
                                                    <h4 className="font-bold text-sm text-gray-800">{sr.recipeName}</h4>
                                                    <span className="text-[10px] text-gray-400 block mt-0.5">저장일: {sr.savedAt}</span>
                                                </div>
                                                <i data-lucide="chevron-right" className="w-4 h-4 text-gray-400"></i>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* 가상 소비 데이터 시각화 통계 */}
                            <div className="bg-gray-50 rounded-2xl p-4 border border-gray-100 space-y-3">
                                <h3 className="text-xs font-bold text-gray-700">📊 나의 식재료 소비 분석 통계</h3>
                                <div className="space-y-2">
                                    <div>
                                        <div className="flex justify-between text-xs text-gray-600 mb-1"><span>채소류 🌱</span><span>40%</span></div>
                                        <div className="w-full bg-gray-200 h-2 rounded-full overflow-hidden"><div className="bg-emerald-500 h-full w-[40%]"></div></div>
                                    </div>
                                    <div>
                                        <div className="flex justify-between text-xs text-gray-600 mb-1"><span>육류 🍖</span><span>30%</span></div>
                                        <div className="w-full bg-gray-200 h-2 rounded-full overflow-hidden"><div className="bg-red-500 h-full w-[30%]"></div></div>
                                    </div>
                                    <div>
                                        <div className="flex justify-between text-xs text-gray-600 mb-1"><span>기타 / 양념류 🍯</span><span>30%</span></div>
                                        <div className="w-full bg-gray-200 h-2 rounded-full overflow-hidden"><div className="bg-amber-500 h-full w-[30%]"></div></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </main>

                {/* 하단 고정 글로벌 네비게이션 탭 바 */}
                <nav className="absolute bottom-0 inset-x-0 bg-white border-t border-gray-100 h-16 grid grid-cols-3 text-center items-center z-40">
                    <button onClick={() => setScreen('UPLOAD')} className={`flex flex-col items-center justify-center text-xs font-medium ${screen === 'UPLOAD' ? 'text-orange-500 font-bold' : 'text-gray-400'}`}>
                        <i data-lucide="camera" className="w-5 h-5 mb-1"></i>파먹기 홈
                    </button>
                    <button onClick={() => { if(ingredients.length > 0) setScreen('EDIT'); else showToast('식재료를 먼저 등록해 주세요.'); }} className={`flex flex-col items-center justify-center text-xs font-medium ${screen === 'EDIT' ? 'text-orange-500 font-bold' : 'text-gray-400'}`}>
                        <i data-lucide="chef-hat" className="w-5 h-5 mb-1"></i>재료 편집
                    </button>
                    <button onClick={() => setScreen('MYPAGE')} className={`flex flex-col items-center justify-center text-xs font-medium ${screen === 'MYPAGE' ? 'text-orange-500 font-bold' : 'text-gray-400'}`}>
                        <i data-lucide="folder-heart" className="w-5 h-5 mb-1"></i>보관함
                    </button>
                </nav>

                {/* 글로벌 풀스크린 모달 로딩 스피너 */}
                {loading && (
                    <div className="absolute inset-0 bg-white/80 z-50 flex flex-col items-center justify-center backdrop-blur-xs">
                        <div className="animate-spin rounded-full h-10 w-10 border-4 border-orange-500 border-t-transparent mb-3"></div>
                        <p className="text-sm font-semibold text-gray-700 animate-pulse">{loadingMessage}</p>
                    </div>
                )}

                {/* 커스텀 토스트 알림창 */}
                {toast.show && (
                    <div className="fixed top-16 inset-x-4 mx-auto max-w-[380px] bg-gray-900/90 text-white text-xs py-3 px-4 rounded-xl shadow-lg z-50 flex items-center justify-center text-center backdrop-blur-xs animate-bounce">
                        {toast.message}
                    </div>
                )}

            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
