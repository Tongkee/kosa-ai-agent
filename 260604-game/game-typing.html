<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한글 타이핑 게임</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1em;
            color: #666;
        }

        .game-section {
            margin-bottom: 30px;
        }

        .display-text {
            background: #f8f9fa;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 25px;
            font-size: 1.8em;
            line-height: 1.8;
            letter-spacing: 0.2em;
            text-align: center;
            min-height: 100px;
            font-weight: 500;
            word-break: keep-all;
        }

        .char {
            position: relative;
        }

        .char.correct {
            color: #10b981;
            background-color: rgba(16, 185, 129, 0.1);
        }

        .char.incorrect {
            color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
        }

        .char.current {
            background-color: #fbbf24;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 49% {
                opacity: 1;
            }
            50%, 100% {
                opacity: 0.3;
            }
        }

        .input-section {
            margin: 25px 0;
        }

        .input-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }

        .input-box {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: border-color 0.3s;
        }

        .input-box:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-box:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-start {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 15px 40px;
            font-size: 1.1em;
        }

        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-start:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #6b7280;
            color: white;
        }

        .btn-reset:hover:not(:disabled) {
            background: #4b5563;
            transform: translateY(-2px);
        }

        .btn-reset:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .settings {
            background: #f0f4ff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .settings-label {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .difficulty-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            padding: 8px 15px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .difficulty-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .difficulty-btn:hover {
            border-color: #667eea;
        }

        .result-message {
            text-align: center;
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: 600;
            display: none;
        }

        .result-message.show {
            display: block;
        }

        .result-message.complete {
            color: #10b981;
        }

        .result-message.incomplete {
            color: #f59e0b;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .title {
                font-size: 1.8em;
            }

            .display-text {
                font-size: 1.4em;
                padding: 15px;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">⌨️ 한글 타이핑 게임</div>
            <div class="subtitle">기계식 키보드 사운드와 함께 한글 타이핑 실력을 테스트하세요!</div>
        </div>

        <div class="settings">
            <div class="settings-label">난이도 선택</div>
            <div class="difficulty-options">
                <button class="difficulty-btn active" data-difficulty="easy">초급</button>
                <button class="difficulty-btn" data-difficulty="normal">중급</button>
                <button class="difficulty-btn" data-difficulty="hard">고급</button>
            </div>
        </div>

        <div class="game-section">
            <div class="input-label">타이핑할 텍스트</div>
            <div class="display-text" id="displayText"></div>
        </div>

        <div class="input-section">
            <label class="input-label">여기에 입력하세요</label>
            <input 
                type="text" 
                class="input-box" 
                id="userInput" 
                placeholder="게임을 시작하면 여기에 입력할 수 있습니다"
                disabled
            >
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-label">타자속도 (글자/분)</div>
                <div class="stat-value" id="wpm">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">정확도</div>
                <div class="stat-value" id="accuracy">0%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">진행도</div>
                <div class="stat-value" id="progress">0%</div>
            </div>
        </div>

        <div class="result-message" id="resultMessage"></div>

        <div class="button-group">
            <button class="btn-start" id="startBtn">게임 시작</button>
            <button class="btn-reset" id="resetBtn">초기화</button>
        </div>
    </div>

    <script>
        // 타이핑 게임 데이터
        const gameTexts = {
            easy: [
                "한국은 동북아시아에 위치한 나라입니다",
                "오늘 날씨가 매우 좋습니다",
                "컴퓨터 과학은 미래의 핵심입니다",
                "책을 읽는 것은 즐거운 경험입니다",
                "음악을 들으면 기분이 좋아집니다",
            ],
            normal: [
                "인공지능 기술은 우리의 일상생활을 점점 더 변화시키고 있습니다",
                "프로그래밍은 창의성과 논리적 사고를 동시에 요구하는 분야입니다",
                "빅데이터 분석을 통해 새로운 인사이트를 얻을 수 있습니다",
                "사이버 보안은 디지털 시대의 가장 중요한 과제 중 하나입니다",
                "클라우드 컴퓨팅은 IT 산업에 혁명을 일으켰습니다",
            ],
            hard: [
                "양자컴퓨터의 출현은 암호화 기술과 정보보안 분야에 근본적인 변화를 가져올 것으로 예상됩니다",
                "머신러닝 알고리즘의 최적화를 위해서는 대규모 데이터셋과 충분한 계산 자원이 필수적입니다",
                "블록체인 기술은 분산 원장 시스템의 신뢰성과 투명성을 보장하는 혁신적인 솔루션입니다",
                "소프트웨어 아키텍처 설계에서 마이크로서비스 패턴은 확장성과 유지보수성을 크게 향상시킵니다",
                "자연어 처리 기술의 발전으로 인간과 기계 간의 상호작용이 더욱 자연스러워지고 있습니다",
            ]
        };

        // 게임 상태
        let gameState = {
            isPlaying: false,
            currentText: '',
            userInput: '',
            startTime: null,
            difficulty: 'easy',
            correctCount: 0,
            totalCount: 0,
        };

        // DOM 요소
        const displayText = document.getElementById('displayText');
        const userInput = document.getElementById('userInput');
        const wpmDisplay = document.getElementById('wpm');
        const accuracyDisplay = document.getElementById('accuracy');
        const progressDisplay = document.getElementById('progress');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultMessage = document.getElementById('resultMessage');

        // 키보드 음향 효과 생성
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioContext = null;

        function initAudioContext() {
            if (!audioContext) {
                audioContext = new AudioContext();
            }
        }

        // 기계식 키보드 효과음 재생
        function playKeySound() {
            initAudioContext();
            const now = audioContext.currentTime;
            
            // 정확도에 따라 다른 톤 재생
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            // 기계식 키보드의 '틱' 소리
            osc.frequency.setValueAtTime(4000, now);
            osc.frequency.exponentialRampToValueAtTime(2000, now + 0.1);
            
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            
            osc.start(now);
            osc.stop(now + 0.05);
        }

        // 정답 음향 효과
        function playCorrectSound() {
            initAudioContext();
            const now = audioContext.currentTime;
            
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.frequency.setValueAtTime(800, now);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            
            osc.start(now);
            osc.stop(now + 0.1);
        }

        // 오답 음향 효과
        function playIncorrectSound() {
            initAudioContext();
            const now = audioContext.currentTime;
            
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.frequency.setValueAtTime(300, now);
            gain.gain.setValueAtValue(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            
            osc.start(now);
            osc.stop(now + 0.1);
        }

        // 게임 시작
        function startGame() {
            initAudioContext();
            
            // 랜덤 텍스트 선택
            const texts = gameTexts[gameState.difficulty];
            gameState.currentText = texts[Math.floor(Math.random() * texts.length)];
            gameState.userInput = '';
            gameState.startTime = Date.now();
            gameState.isPlaying = true;
            gameState.correctCount = 0;
            gameState.totalCount = gameState.currentText.length;
            
            // UI 업데이트
            userInput.disabled = false;
            userInput.value = '';
            userInput.focus();
            startBtn.disabled = true;
            resultMessage.classList.remove('show');
            
            // 난이도 버튼 비활성화
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.disabled = true;
            });
            
            renderDisplayText();
            updateStats();
        }

        // 텍스트 렌더링
        function renderDisplayText() {
            let html = '';
            for (let i = 0; i < gameState.currentText.length; i++) {
                const char = gameState.currentText[i];
                let className = 'char';
                
                if (i < gameState.userInput.length) {
                    if (gameState.userInput[i] === char) {
                        className += ' correct';
                    } else {
                        className += ' incorrect';
                    }
                } else if (i === gameState.userInput.length) {
                    className += ' current';
                }
                
                html += `<span class="${className}">${char}</span>`;
            }
            displayText.innerHTML = html;
        }

        // 통계 업데이트
        function updateStats() {
            // 정확도 계산
            gameState.correctCount = 0;
            for (let i = 0; i < gameState.userInput.length; i++) {
                if (gameState.userInput[i] === gameState.currentText[i]) {
                    gameState.correctCount++;
                }
            }
            
            const totalTyped = gameState.userInput.length;
            const accuracy = totalTyped > 0 
                ? Math.round((gameState.correctCount / totalTyped) * 100) 
                : 0;
            
            // 진행도 계산
            const progress = Math.round((gameState.userInput.length / gameState.currentText.length) * 100);
            
            // 타자속도 계산 (글자/분)
            const elapsedSeconds = (Date.now() - gameState.startTime) / 1000;
            const elapsedMinutes = elapsedSeconds / 60;
            const wpm = elapsedMinutes > 0 
                ? Math.round(gameState.correctCount / elapsedMinutes)
                : 0;
            
            // 화면에 표시
            wpmDisplay.textContent = wpm;
            accuracyDisplay.textContent = accuracy + '%';
            progressDisplay.textContent = progress + '%';
        }

        // 게임 완료
        function completeGame() {
            gameState.isPlaying = false;
            userInput.disabled = true;
            startBtn.disabled = false;
            
            // 난이도 버튼 활성화
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.disabled = false;
            });
            
            // 최종 통계 표시
            updateStats();
            
            const accuracy = parseInt(accuracyDisplay.textContent);
            const wpm = parseInt(wpmDisplay.textContent);
            
            let message = '';
            let messageClass = '';
            
            if (accuracy === 100) {
                message = `완벽합니다! 타자속도: ${wpm}글자/분, 정확도: ${accuracy}%`;
                messageClass = 'complete';
            } else if (accuracy >= 95) {
                message = `훌륭합니다! 타자속도: ${wpm}글자/분, 정확도: ${accuracy}%`;
                messageClass = 'complete';
            } else if (accuracy >= 90) {
                message = `좋습니다! 타자속도: ${wpm}글자/분, 정확도: ${accuracy}%`;
                messageClass = 'complete';
            } else {
                message = `수고했습니다! 타자속도: ${wpm}글자/분, 정확도: ${accuracy}%`;
                messageClass = 'incomplete';
            }
            
            resultMessage.textContent = message;
            resultMessage.className = 'result-message show ' + messageClass;
        }

        // 초기화
        function resetGame() {
            gameState = {
                isPlaying: false,
                currentText: '',
                userInput: '',
                startTime: null,
                difficulty: gameState.difficulty,
                correctCount: 0,
                totalCount: 0,
            };
            
            userInput.value = '';
            userInput.disabled = true;
            startBtn.disabled = false;
            displayText.innerHTML = '타이핑할 텍스트가 표시됩니다';
            wpmDisplay.textContent = '0';
            accuracyDisplay.textContent = '0%';
            progressDisplay.textContent = '0%';
            resultMessage.classList.remove('show');
            
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.disabled = false;
            });
        }

        // 이벤트 리스너
        startBtn.addEventListener('click', startGame);
        resetBtn.addEventListener('click', resetGame);

        userInput.addEventListener('input', (e) => {
            if (!gameState.isPlaying) return;
            
            const input = e.target.value;
            
            // 새로운 글자가 입력되었는지 확인
            if (input.length > gameState.userInput.length) {
                playKeySound();
                
                // 입력한 글자가 맞는지 확인
                const currentCharIndex = gameState.userInput.length;
                if (input[currentCharIndex] === gameState.currentText[currentCharIndex]) {
                    playCorrectSound();
                } else {
                    playIncorrectSound();
                }
            }
            
            gameState.userInput = input;
            renderDisplayText();
            updateStats();
            
            // 게임 완료 확인
            if (gameState.userInput.length === gameState.currentText.length && 
                gameState.userInput === gameState.currentText) {
                completeGame();
            }
        });

        // 난이도 선택
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.difficulty-btn').forEach(b => {
                    b.classList.remove('active');
                });
                e.target.classList.add('active');
                gameState.difficulty = e.target.dataset.difficulty;
            });
        });

        // 초기 상태 설정
        resetGame();
    </script>
</body>
</html>
