## 💡 개발 포인트 및 구현 상세 설명

* **클라이언트 측 이미지 압축 시스템 탑재**: 모바일 카메라로 직접 찍은 초고해상도 원본 사진을 그대로 전송하면 통신 비용과 API 타임아웃 레이턴시가 급격히 길어집니다[cite: 77]. 이를 방지하기 위해 `Canvas API`를 커스텀 내장하여 최대 가로 폭 800px 단위의 합리적인 스펙으로 리사이징 및 퀄리티 압축(JPEG 0.7)을 수행한 뒤 Base64 텍스트로 전환하도록 최적화했습니다[cite: 18, 77].
* **완벽한 비동기 순수 JSON 구조화 (Structured Outputs)**: 기획서에서 명시된 JSON 반환 양식을 AI가 일점일획의 오류 없이 반환할 수 있도록 시스템 지시 문맥 프롬프트를 고도화하여 내장했습니다[cite: 19, 20, 23]. 
* **TTS 음성 오디오 재생 가이드**: 손에 물기나 양념이 묻어 모바일 스크린을 조작하기 어려운 사용자의 조리 상황 특성을 고려하여 브라우저 내장 `Web Speech API(SpeechSynthesis)` 모듈을 유기적으로 연동했습니다[cite: 8, 63]. 각 단계별 조리법을 한국어 스피커 음성으로 즉각 읽어내려갑니다[cite: 63].
